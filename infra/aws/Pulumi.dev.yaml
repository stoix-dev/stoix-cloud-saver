# Non-secret config only. AWS credentials come from the environment at runtime
# (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_PROFILE), never committed here.
config:
  aws:region: us-east-1
  stoix-cloud-saver-aws:region: us-east-1
  stoix-cloud-saver-aws:instanceType: t3.small
  stoix-cloud-saver-aws:desiredCapacity: "1"
  stoix-cloud-saver-aws:minSize: "1"
  stoix-cloud-saver-aws:maxSize: "2"
  stoix-cloud-saver-aws:domain: aws.demo.example.com
  stoix-cloud-saver-aws:acmeEmail: devops@stoix.dev
  # Replace with the real published image before deploy.
  stoix-cloud-saver-aws:image: public.ecr.aws/stoix/cloud-saver:dev
  stoix-cloud-saver-aws:appVersion: dev
